name: Refresh data

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch NYC Open Data catalog
        run: python build/fetch_catalog.py

      - name: Generate feeds
        run: python build/generate_feeds.py

      - name: Compute weekly stats
        run: python build/weekly_stats.py

      - name: Match news headlines to datasets
        run: python build/news_match.py
        continue-on-error: true

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data feeds
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily data refresh"
            git push
          fi
